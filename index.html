<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SneakBit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100%;
        overflow: hidden;
        font-family: monospace;
        color: #ccc;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas#game {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #000;
        /* No max-width/height: js/zoom.js sizes the canvas to be a hair
           bigger than the viewport so integer-scaling doesn't leave a
           thin black border on viewports whose width isn't a clean
           multiple of (scale × TILE_SIZE). The overflow is clipped by
           body { overflow: hidden }. */
      }
      #hud {
        position: fixed;
        top: 64px;
        left: 12px;
        font-size: 12px;
        line-height: 1.4;
        opacity: 0.75;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
        text-shadow: 0 1px 0 #000;
      }
      .hud-row { white-space: nowrap; }
    </style>
  </head>
  <body>
    <canvas id="game" width="960" height="640"></canvas>
    <div id="hud"></div>
    <script type="module" src="./client/main.js"></script>
  </body>
</html>
